spring:
  datasource:
    url: jdbc:h2:mem:builtin_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

builtin:
  jwt:
    secret: test-secret-key-for-jwt-signing-minimum-256-bits-long
    expiration-ms: 3600000
  loyalty:
    points-per-1000-rwf: 1
