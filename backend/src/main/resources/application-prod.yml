# Production profile — PostgreSQL (Supabase or Render) + cloud port
spring:
  datasource:
    url: ${SUPABASE_DB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/bettina_hardware}}
    username: ${SUPABASE_DB_USER:${DB_USER:bettina}}
    password: ${SUPABASE_DB_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

bettina:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://frontend-mu-wine-23.vercel.app}
  loyalty:
    points-per-1000-rwf: ${LOYALTY_POINTS_PER_1000_RWF:1}

logging:
  level:
    com.bettina.hardware: INFO
