spring:
  datasource:
    url: jdbc:h2:file:./data/bettina_dev;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true

server:
  port: 8081

bettina:
  cors:
    allowed-origins: http://localhost:3000

logging:
  level:
    com.bettina.hardware: DEBUG
