spring:
  datasource:
    url: jdbc:h2:file:./data/builtin_dev;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true

server:
  port: 8082

builtin:
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://frontend-mu-wine-23.vercel.app
      - https://frontend-isherves-projects.vercel.app
      - https://frontend-armm9t4ae-isherves-projects.vercel.app

logging:
  level:
    com.bettina.hardware: DEBUG
