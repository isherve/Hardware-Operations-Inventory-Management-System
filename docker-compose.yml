services:
  postgres:
    image: postgres:17-alpine
    container_name: bettina-postgres
    environment:
      POSTGRES_DB: bettina_hardware
      POSTGRES_USER: bettina
      POSTGRES_PASSWORD: bettina_secret
    ports:
      - "5432:5432"
    volumes:
      - bettina_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bettina -d bettina_hardware"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bettina_pgdata:
