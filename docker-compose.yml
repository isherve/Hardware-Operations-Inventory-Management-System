services:
  postgres:
    image: postgres:17-alpine
    container_name: builtin-postgres
    environment:
      POSTGRES_DB: builtin_hardware
      POSTGRES_USER: builtin
      POSTGRES_PASSWORD: builtin_secret
    ports:
      - "5432:5432"
    volumes:
      - builtin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U builtin -d builtin_hardware"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  builtin_pgdata:
